name: Voxi
options:
  bundleIdPrefix: com.colin
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
packages:
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift
    from: 1.0.0
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    maxVersion: 0.16.0
    minVersion: 0.15.4
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.11.1
targets:
  Voxi:
    type: application
    platform: macOS
    sources:
      # Exclude module CLAUDE.md steering files from the app target.
      - path: Sources/Voxi
        excludes: ["**/*.md"]
      - path: Resources/Assets.xcassets
    dependencies:
      - package: ArgmaxOSS
        product: WhisperKit
      - package: FluidAudio
        product: FluidAudio
      - package: GRDB
        product: GRDB
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Voxi
        CFBundleDisplayName: Voxi
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSMicrophoneUsageDescription: Voxi needs the microphone to transcribe your dictation.
        NSAppleEventsUsageDescription: Voxi uses Apple Events to insert dictated text into other applications.
        NSPrincipalClass: NSApplication
    entitlements:
      path: Resources/Voxi.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colin.voxi
        CODE_SIGN_STYLE: Automatic
        # Real dev identity (not ad-hoc "-"): TCC grants (Accessibility, Mic)
        # key off the signing identity and must survive rebuilds.
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: F7H963S3B4
        ENABLE_HARDENED_RUNTIME: false
        ENABLE_USER_SCRIPT_SANDBOXING: false
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  VoxiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/VoxiTests
    dependencies:
      - target: Voxi
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Voxi.app/Contents/MacOS/Voxi
        GENERATE_INFOPLIST_FILE: true
schemes:
  Voxi:
    build:
      targets:
        Voxi: all
        VoxiTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VoxiTests
