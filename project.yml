name: Voxi
options:
  bundleIdPrefix: com.colin
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
packages:
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift
    from: 1.0.0
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    maxVersion: 0.16.0
    minVersion: 0.15.4
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.11.1
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.7.0
targets:
  Voxi:
    type: application
    platform: macOS
    sources:
      # Exclude module CLAUDE.md steering files from the app target.
      - path: Sources/Voxi
        excludes: ["**/*.md"]
      - path: Resources/Assets.xcassets
    dependencies:
      - package: ArgmaxOSS
        product: WhisperKit
      - package: FluidAudio
        product: FluidAudio
      - package: GRDB
        product: GRDB
      - package: Sparkle
        product: Sparkle
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Voxi
        CFBundleDisplayName: Voxi
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.productivity
        NSMicrophoneUsageDescription: Voxi needs the microphone to transcribe your dictation.
        NSAppleEventsUsageDescription: Voxi uses Apple Events to insert dictated text into other applications.
        NSPrincipalClass: NSApplication
        # Sparkle: feed lives in this repo (public), enclosures on GitHub
        # release assets. Private EdDSA key is in Colin's login Keychain.
        SUFeedURL: https://raw.githubusercontent.com/trickycdm/voxi/main/appcast.xml
        SUPublicEDKey: lgo/WcCmoBkJs/6yFjggrqIdFO0nmi5rzLHhlu1QLZE=
        SUEnableAutomaticChecks: true
    entitlements:
      path: Resources/Voxi.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colin.voxi
        DEVELOPMENT_TEAM: F7H963S3B4
        ENABLE_USER_SCRIPT_SANDBOXING: false
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          # Real dev identity (not ad-hoc "-"): daily TCC grants (Accessibility,
          # Mic) key off THIS identity and must survive rebuilds. Never change
          # the Debug identity casually (steering/MACOS_PLATFORM.md).
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
          ENABLE_HARDENED_RUNTIME: false
        Release:
          # Distribution identity — Scripts/release.sh archives with this.
          # Manual style: Developer ID with unrestricted entitlements needs no
          # provisioning profile, and Automatic export can demand an Apple ID
          # sign-in mid-script. Hardened runtime is required for notarisation.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          ENABLE_HARDENED_RUNTIME: true
  VoxiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/VoxiTests
    dependencies:
      - target: Voxi
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Voxi.app/Contents/MacOS/Voxi
        GENERATE_INFOPLIST_FILE: true
schemes:
  Voxi:
    build:
      targets:
        Voxi: all
        VoxiTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VoxiTests
